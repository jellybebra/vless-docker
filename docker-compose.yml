services:
  traefik:
    image: traefik:v3.6.13
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik-public"

      # Стандартные точки входа
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.loopback.address=:8443"
      - "--entrypoints.loopback.proxyProtocol.insecure=true"

      # Глобальный редирект HTTP -> HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"

      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - traefik-public

  fakesite:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - fakesite_data:/usr/share/nginx/html
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -f /usr/share/nginx/html/index.html ]; then
          echo "Downloading fake website templates..."
          apk add --no-cache git coreutils >/dev/null 2>&1
          temp_dir=$$(mktemp -d)
          git clone --depth=1 https://github.com/learning-zone/website-templates.git $$temp_dir >/dev/null 2>&1
          selected=$$(find $$temp_dir -mindepth 1 -maxdepth 1 -type d | shuf -n 1)
          cp -a $$selected/. /usr/share/nginx/html/
          rm -rf $$temp_dir
          echo "Fake website successfully installed!"
        fi
        exec nginx -g "daemon off;"
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      # Ловим трафик только на порту 8443 (loopback) после проверки Xray
      - "traefik.http.routers.fakesite-https.rule=Host(`${SELF_SNI_DOMAIN}`)"
      - "traefik.http.routers.fakesite-https.entrypoints=loopback"
      - "traefik.http.routers.fakesite-https.tls=true"
      - "traefik.http.routers.fakesite-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.fakesite-svc.loadbalancer.server.port=80"

  vless:
    image: ghcr.io/jellybebra/vless-docker:latest
    restart: unless-stopped
    environment:
      XUI_USERNAME: "${XUI_USERNAME}"
      XUI_PASSWORD: "${XUI_PASSWORD}"
      XUI_WEBPATH: "${XUI_WEBPATH}"
      SELF_SNI_DOMAIN: "${SELF_SNI_DOMAIN}"
      REALITY_DEST: "${REALITY_DEST:-traefik:8443}"

    volumes:
      - ./data/xui:/etc/x-ui
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"

      # 1. TCP Роутер (Вернул привязку к сервису)
      - "traefik.tcp.routers.vless-https.rule=HostSNI(`${SELF_SNI_DOMAIN}`)"
      - "traefik.tcp.routers.vless-https.tls=true"
      - "traefik.tcp.routers.vless-https.tls.passthrough=true"
      - "traefik.tcp.routers.vless-https.entrypoints=websecure"
      - "traefik.tcp.routers.vless-https.service=vless-https-svc"
      - "traefik.tcp.services.vless-https-svc.loadbalancer.server.port=443"

      # 2. HTTP Роутер панели X-UI (Вернул приоритет и привязку к сервису)
      - "traefik.http.routers.vless-panel.rule=Host(`${SELF_SNI_DOMAIN}`) && PathPrefix(`/${XUI_WEBPATH}`)"
      - "traefik.http.routers.vless-panel.entrypoints=loopback"
      - "traefik.http.routers.vless-panel.tls=true"
      - "traefik.http.routers.vless-panel.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vless-panel.priority=200"
      - "traefik.http.routers.vless-panel.service=vless-panel-svc"
      - "traefik.http.services.vless-panel-svc.loadbalancer.server.port=8080"

      # 3. HTTP Роутер подписок (Вернул приоритет и привязку к сервису)
      - "traefik.http.routers.vless-sub.rule=Host(`${SELF_SNI_DOMAIN}`) && PathPrefix(`/sub/`)"
      - "traefik.http.routers.vless-sub.entrypoints=loopback"
      - "traefik.http.routers.vless-sub.tls=true"
      - "traefik.http.routers.vless-sub.tls.certresolver=letsencrypt"
      - "traefik.http.routers.vless-sub.priority=190"
      - "traefik.http.routers.vless-sub.service=vless-sub-svc"
      - "traefik.http.services.vless-sub-svc.loadbalancer.server.port=2096"

volumes:
  fakesite_data:
  traefik_letsencrypt:

networks:
  traefik-public:
    external: true